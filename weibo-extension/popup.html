<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>微博热搜屏蔽</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <section class="card">
        <div class="header">
          <div>
            <h1>微博热搜屏蔽</h1>
            <p>命中规则后将条目直接从热搜列表移除。</p>
          </div>
          <label class="switch">
            <input id="enabled" type="checkbox">
            <span>启用</span>
          </label>
        </div>
      </section>

      <section class="card">
        <label class="label" for="patterns">新增屏蔽文本</label>
        <textarea
          id="patterns"
          rows="4"
          placeholder="每行一条，例如：&#10;广告&#10;兼职&#10;直播带货"
        ></textarea>
        <button id="addPatterns" type="button">添加到规则</button>
        <p class="hint">文本匹配会忽略大小写、空格和常见符号。</p>
      </section>

      <section class="card">
        <span class="label">云端规则</span>
        <label class="label compact" for="cloudRulesUrl">GitHub Raw URL</label>
        <input id="cloudRulesUrl" class="text-input" type="url" placeholder="https://raw.githubusercontent.com/.../rules.json">
        <button id="syncCloudRules" type="button">同步云端规则</button>
        <p id="cloudRulesMeta" class="hint">本地规则和云端规则会同时匹配。</p>
      </section>

      <section class="card">
        <div class="list-header">
          <span class="label">当前规则</span>
          <div class="list-actions">
            <button id="importPatterns" class="ghost" type="button">导入</button>
            <button id="exportPatterns" class="ghost" type="button">导出</button>
            <button id="clearPatterns" class="ghost" type="button">清空</button>
          </div>
        </div>
        <input id="importFile" type="file" accept=".json,.txt,application/json,text/plain" hidden>
        <input id="patternSearch" class="search-input" type="text" placeholder="搜索规则">
        <div class="pattern-list-wrap">
          <ul id="patternList" class="pattern-list"></ul>
        </div>
        <p id="emptyState" class="hint">暂无规则，添加后在热搜页自动生效。</p>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
